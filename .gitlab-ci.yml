stages:
  - android
  - build
  - deploy

image: node:22

cache:
  paths:
    - node_modules/

export_pwa:
  stage: build
  script:
    - npm install -g vercel
    - npm ci
    - npx expo export --platform web --output-dir dist
  artifacts:
    paths:
      - dist/

deploy_pwa_vercel:
  stage: deploy
  script:
    - vercel deploy dist --yes --prod --token $VERCEL_TOKEN
  dependencies:
    - export_pwa

build_apk:
  stage: android
  image: node:22
  script:
    - npm install -g eas-cli firebase-tools
    - npm ci
    - eas build --platform android --profile development --non-interactive --json > result.json
    - node -e "console.log(require('./result.json').artifacts.android.buildUrl)" > apk_url.txt
    - $env:APK_URL = Get-Content apk_url.txt
    - curl -L "$env:APK_URL" -o app.apk
    - firebase appdistribution:distribute app.apk `
        --app $env:FIREBASE_APP_ID `
        --token $env:FIREBASE_TOKEN `
        --groups "testadores"
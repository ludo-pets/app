stages:
  - build
  - deploy
  - android
  
image: node:22

cache:
  paths:
    - node_modules/

export_pwa:
  stage: build
  script:
    - npm install -g vercel
    - npm ci
    - npx expo export --platform web --output-dir dist
  artifacts:
    paths:
      - dist/

deploy_pwa_vercel:
  stage: deploy
  script:
    - vercel deploy dist --yes --prod --token $VERCEL_TOKEN
  dependencies:
    - export_pwa

build_apk:
  stage: android
  image: node:22
  script:
    - npm install -g eas-cli firebase-tools
    - eas build --platform android --profile development --non-interactive --json > result.json
    - export APK_URL=$(cat result.json | jq -r '.artifacts.android.buildUrl')
    - curl -L "$APK_URL" -o app.apk
    - firebase appdistribution:distribute app.apk \
        --app $FIREBASE_APP_ID \
        --token $FIREBASE_TOKEN \
        --groups "testadores"
stages:
  - build
  - distribute
  - pwa
  - deploy

variables:
  GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS

before_script:
  - echo "$GOOGLE_APPLICATION_CREDENTIALS" | tr -d '\n' | base64 -d > /tmp/service-account.json
  - export GOOGLE_APPLICATION_CREDENTIALS="/tmp/service-account.json"

image: node:22

cache:
  paths:
    - node_modules/

export_pwa:
  stage: pwa
  script:
    - npm install -g vercel
    - npm ci
    - npx expo export --platform web --output-dir dist
  artifacts:
    paths:
      - dist/

deploy_pwa_vercel:
  stage: deploy
  script:
    - vercel deploy dist --yes --prod --token $VERCEL_TOKEN
  dependencies:
    - export_pwa

build_apk:
  stage: build
  image: node:22
  script:
    - npm ci
    - eas build --platform android --profile production --non-interactive --json > result.json
    - APK_URL=$(jq -r '.[0].artifacts.buildUrl' result.json)
    - curl -o app.apk "$APK_URL"

distribute_apk:
  stage: distribute
  image: node:22
  script:
    - npm install -g firebase-tools
    - firebase appdistribution:distribute app.apk --app $FIREBASE_ANDROID_APP_ID --groups "testadores"